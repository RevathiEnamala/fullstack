<!DOCTYPE html>
<html>
<head>
    <title>Simple Card</title>
    <style>
        /* CSS: This styles the elements */
        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            font-family: Arial, sans-serif;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            width: 250px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello!</h1>
        <p>This is a simple card built with HTML and CSS By E.Revathi.</p>
        <button onclick="alert('Success!')">Click Me</button>
    </div>

</body>
</html>
