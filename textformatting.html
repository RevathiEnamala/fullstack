<!DOCTYPE html>
<html>
<head>
    <title>HTML Formatting Demo</title>
</head>
<body>

    <h2>Text Formatting Examples</h2>
    
    <p>my name is  <u>E.Revathi</u> im from <u>CSM</u>department.</p>
    <hr>
    <p>im studying in  <i>sistk</i> <br> puttur.</p>
    <hr>
    <p>im currently pursuing my <strong>3rd year</strong></p>
    <p>We can <mark>highlight</mark> specific parts of a sentence.</p>
    
    <p>Chemical formula for water: H<sub>2</sub>O</p>
    
    <p>Pythagorean theorem: a<sup>2</sup> + b<sup>2</sup> = c<sup>2</sup></p>
    
    <p>The price is <del>$50</del> <ins>$30</ins>!</p>

</body>
</html>
