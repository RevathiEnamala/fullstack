<!DOCTYPE html>
<html>
<head>
    <title>JS Mouse Events</title>
    <style>
        #box {
            width: 300px;
            height: 150px;
            background-color: #3498db;
            color: white;
            text-align: center;
            line-height: 150px;
            font-size: 20px;
            font-family: sans-serif;
            transition: 0.3s; /* Makes color changes smooth */
        }
    </style>
</head>
<body>

    <h2>Mouse events</h2>
    <div id="box">Hover or Click Me!</div>

    <script>
        
        const myBox = document.getElementById("box");

        myBox.onmouseover = function() {
            this.style.backgroundColor = "#2ecc71"; // Green
            this.innerText = "Mouse is Over!";
        };

        myBox.onmouseout = function() {
            this.style.backgroundColor = "#3498db"; // Blue
            this.innerText = "Mouse is Out!";
        };

        myBox.onmousedown = function() {
            this.style.backgroundColor = "#e74c3c"; // Red
            this.innerText = "Holding Down...";
        };

        myBox.onmouseup = function() {
            this.style.backgroundColor = "#2ecc71"; // Back to Green
            this.innerText = "Released!";
        };

        myBox.onclick = function() {
            console.log("The box was clicked!");
        };
    </script>

</body>
</html>
