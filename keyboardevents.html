<!DOCTYPE html>
<html>
<body>

    <h3>Small Keyboard Event Demo</h3>
    
    <input type="text" 
           placeholder="Type something..."
           onkeydown="this.style.color = 'red';" 
           onkeyup="this.style.color = 'blue';"
           onkeypress="console.log('You are typing...')">

    <p><i>The text turns <b>red</b> when pressing down and <b>blue</b> when released.</i></p>

</body>
</html>
